# THE VOID - Decap CMS Configuration
# This controls what you can edit in the admin panel at /admin

backend:
  name: github
  repo: Laca228/thevoide-website
  branch: main
  base_url: https://thevoid-admin.netlify.app
  auth_endpoint: auth

media_folder: "images/uploads"
public_folder: "/images/uploads"

site_url: https://thevoid-net.com
display_url: https://thevoid-net.com
logo_url: https://thevoid-net.com/hero.png

locale: 'hu'

collections:
  - name: "posts"
    label: "📰 Blog Posztok"
    label_singular: "Blog Poszt"
    folder: "posts"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{title_hu}} — {{date}}"
    fields:
      - { label: "🇭🇺 Cím (magyar)", name: "title_hu", widget: "string" }
      - { label: "🇬🇧 Title (English)", name: "title_en", widget: "string" }
      - { label: "📅 Dátum", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - label: "🏷️ Badge (címke)"
        name: "badge_class"
        widget: "select"
        options:
          - { label: "Frissítés (lila)", value: "update" }
          - { label: "Esemény (arany)", value: "event" }
          - { label: "Devlog (cyan)", value: "devlog" }
          - { label: "Közösség (rózsa)", value: "milestone" }
      - { label: "🏷️ Badge szöveg (magyar)", name: "badge_hu", widget: "string" }
      - { label: "🏷️ Badge text (English)", name: "badge_en", widget: "string" }
      - { label: "ℹ️ Meta info (magyar)", name: "meta_hu", widget: "string", hint: "Pl. 'Season 1 · 5 perc olvasás'" }
      - { label: "ℹ️ Meta info (English)", name: "meta_en", widget: "string", hint: "e.g. 'Season 1 · 5 min read'" }
      - { label: "🖼️ Borítókép", name: "image", widget: "image", required: false }
      - { label: "🇭🇺 Rövid összefoglaló (magyar)", name: "excerpt_hu", widget: "text" }
      - { label: "🇬🇧 Short summary (English)", name: "excerpt_en", widget: "text" }
      - { label: "🇭🇺 Link gomb szövege (magyar)", name: "cta_hu", widget: "string" }
      - { label: "🇬🇧 Link button text (English)", name: "cta_en", widget: "string" }
      - { label: "🇭🇺 Teljes tartalom (magyar)", name: "body_hu", widget: "markdown" }
      - { label: "🇬🇧 Full content (English)", name: "body_en", widget: "markdown" }
